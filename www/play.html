<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" media="screen" href="./style.css" type="text/css" />
        <style>
            body {
                margin: 0;
                padding: 0;
            }

            body,
            html,
            .container {
                height: 100%;
                max-height: 100%;
            }
            header {
            padding: 1rem 2rem;
            }
            .container {
            display: flex;
            }
            .container {
            flex-direction: column;
            }

            h1 {
                margin: 0;
                padding: 0;
                font-size: 1.5rem;
            }

            .alert {
                font-size: 1rem;
            }

            .container > header {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            header a {
                font-size: 1.125rem;
            }

            @media(width <= 1000px) {
                body,
                html,
                .container {
                    height: auto;
                    max-height: auto;
                }

                .container > header {
                    flex-direction: column;
                    align-items: start;
                    gap: 1rem;
                }

                h1 {
                    font-size: 1.25rem;
                }
                .alert {
                    font-size: .9rem;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
        </div>
        <script type="module" src="./index.js"></script>
    </body>
</html>
